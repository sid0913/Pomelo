<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" aria-label="Pomelo orbit mark">
  <!-- orbit trajectory (dark) -->
  <ellipse cx="96" cy="110" rx="80" ry="34" fill="none" stroke="#7C2D12" stroke-width="3.5" opacity="0.9" transform="rotate(-24 96 110)"></ellipse>
  <!-- fruit body -->
  <circle cx="96" cy="110" r="60" fill="#C2410C"></circle>
  <circle cx="96" cy="110" r="51" fill="#D97706"></circle>
  <!-- dimple highlight -->
  <ellipse cx="78" cy="90" rx="16" ry="11" fill="#FBBF24" opacity="0.6"></ellipse>
  <!-- leaf -->
  <path d="M 102 48 Q 126 20 146 36 Q 122 54 102 48 Z" fill="#5E8C2A"></path>
  <!-- orbiting spark -->
  <g transform="rotate(-24 96 110)">
    <circle cx="176" cy="110" r="9" fill="#7C2D12"></circle>
    <circle cx="176" cy="110" r="3.5" fill="#FEF3EC"></circle>
  </g>
</svg>