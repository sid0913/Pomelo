<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" aria-label="Pomelo orbit mark">
  <!-- orbit — back half (tucked behind) -->
  <ellipse cx="96" cy="96" rx="76" ry="33" fill="none" stroke="#7C2D12" stroke-width="3.5" opacity="0.9" transform="rotate(-20 96 96)"></ellipse>
  <!-- fruit body -->
  <circle cx="96" cy="110" r="60" fill="#C2410C"></circle>
  <circle cx="96" cy="110" r="51" fill="#D97706"></circle>
  <!-- dimple highlight -->
  <ellipse cx="76" cy="90" rx="15" ry="10" fill="#FBBF24" opacity="0.55"></ellipse>
  <!-- leaf -->
  <path d="M 102 48 Q 126 20 146 36 Q 122 54 102 48 Z" fill="#5E8C2A"></path>
  <!-- orbit — front half (over the face) + spark -->
  <g transform="rotate(-20 96 96)">
    <path d="M 20 96 A 76 33 0 0 0 172 96" fill="none" stroke="#7C2D12" stroke-width="3.5" opacity="0.9"></path>
    <circle cx="172" cy="96" r="9" fill="#7C2D12"></circle>
    <circle cx="172" cy="96" r="3.5" fill="#FEF3EC"></circle>
  </g>
</svg>